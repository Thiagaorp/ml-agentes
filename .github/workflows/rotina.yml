name: ML Rotina Diaria
# Sincroniza, analisa e manda o relatório no Telegram todo dia de manhã.

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC = 08:00 no horário de Brasília
  workflow_dispatch:

# Mesmo grupo do atendente: nunca rodam ao mesmo tempo (evita corrida no token do ML).
concurrency:
  group: ml-agentes-token
  cancel-in-progress: false

jobs:
  rotina:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Restaurar token do ML
        uses: actions/cache/restore@v4
        with:
          path: token.json
          key: ml-token-${{ github.run_id }}
          restore-keys: ml-token-

      - name: Semear token na primeira execução
        env:
          ML_TOKEN_JSON_B64: ${{ secrets.ML_TOKEN_JSON_B64 }}
        run: |
          if [ ! -f token.json ]; then
            echo "$ML_TOKEN_JSON_B64" | base64 -d > token.json
          fi

      - name: Sincronizar, analisar e enviar relatório
        env:
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_REDIRECT_URI: ${{ secrets.ML_REDIRECT_URI }}
          ML_SITE: ${{ secrets.ML_SITE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py tudo

      - name: Salvar token atualizado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: token.json
          key: ml-token-${{ github.run_id }}
